<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>HVN Financial Analysis - Streamlit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.1/build/stlite.css" />
    <style>
      body, html { height: 100%; margin: 0; padding: 0; background: #0e1117;}
      #root { height: 100%; width: 100%; }
      .loading-screen {
        width: 100%; height: 100vh;
        background-color: #0e1117; color: white;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: sans-serif; text-align: center; padding: 20px; box-sizing: border-box;
      }
      .spinner {
        border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ff4b4b;
        border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #error-log {
        margin-top: 20px; color: #ff4b4b; max-width: 800px; text-align: left;
        background: rgba(255,0,0,0.1); padding: 10px; border-radius: 5px; display: none;
        white-space: pre-wrap; word-wrap: break-word; font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen" id="loading-ui">
        <div class="spinner" id="spinner"></div>
        <h2 id="status-text">Đang khởi tạo môi trường Python (WebAssembly)...</h2>
        <p>Có thể mất 15-40 giây trong lần tải đầu tiên để cài đặt thư viện lõi, vui lòng chờ nhé!</p>
        <div id="error-log"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.1/build/stlite.js"></script>
    <script>
      const errorLog = document.getElementById('error-log');
      const statusText = document.getElementById('status-text');
      const spinner = document.getElementById('spinner');

      // Catch global errors (missing files, WASM memory issues, Pyodide install failures)
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        errorLog.style.display = 'block';
        spinner.style.display = 'none';
        statusText.innerText = "Đã xảy ra lỗi nghiêm trọng trong quá trình tải!";
        errorLog.innerText += `Lỗi: ${msg}\n`;
        return false;
      };
      
      window.addEventListener("unhandledrejection", function(event) {
        errorLog.style.display = 'block';
        spinner.style.display = 'none';
        statusText.innerText = "Lỗi khi tải thư viện/file (Có thể do mạng, 404 hoặc giới hạn bộ nhớ WASM)";
        errorLog.innerText += `Chi tiết: ${event.reason}\n`;
      });

      const v = "?v=" + new Date().getTime(); 
      try {
        stlite.mount(
          {
            requirements: ["streamlit", "pandas", "numpy", "plotly", "openpyxl", "scikit-learn"],
            entrypoint: "app.py",
            files: {
              "app.py": { url: "./src/app.py" + v },
              "calculator.py": { url: "./src/calculator.py" + v },
              "data_processor.py": { url: "./src/data_processor.py" + v },
              "forecaster.py": { url: "./src/forecaster.py" + v },
              "ml_analyzer.py": { url: "./src/ml_analyzer.py" + v },
              "validator.py": { url: "./src/validator.py" + v },
              "data/hvn_data.xlsx": { url: "./data/hvn_data.xlsx" + v }
            }
          },
          document.getElementById("root")
        );
      } catch(e) {
        window.onerror(e.message, null, null, null, e);
      }
    </script>
  </body>
</html>
