<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>HVN Financial Analysis - Streamlit</title>
    <!-- Stlite CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.1/build/stlite.css" />
    <style>
      body, html { height: 100%; margin: 0; padding: 0; background: #0e1117;}
      #root { height: 100%; width: 100%; }
      .loading-screen {
        width: 100%; height: 100vh;
        background-color: #0e1117; color: white;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: sans-serif;
      }
      .spinner {
        border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ff4b4b;
        border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Stlite Container with Loading inside (will be replaced by Streamlit when ready) -->
    <div id="root">
      <div class="loading-screen">
        <div class="spinner"></div>
        <h2>Đang khởi tạo môi trường Python (WebAssembly)...</h2>
        <p>Có thể mất 15-40 giây trong lần tải đầu tiên để cài đặt thư viện lõi, vui lòng chờ nhé!</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.31.1/build/stlite.js"></script>
    <script>
      // Cache-busting mechanism to ensure fresh code and data from Github Pages
      const v = "?v=" + new Date().getTime(); 
      stlite.mount(
        {
          requirements: ["streamlit", "pandas", "numpy", "plotly", "openpyxl", "scikit-learn"],
          entrypoint: "app.py",
          files: {
            "app.py": { url: "./src/app.py" + v },
            "calculator.py": { url: "./src/calculator.py" + v },
            "data_processor.py": { url: "./src/data_processor.py" + v },
            "forecaster.py": { url: "./src/forecaster.py" + v },
            "ml_analyzer.py": { url: "./src/ml_analyzer.py" + v },
            "validator.py": { url: "./src/validator.py" + v },
            // Only mount the required data file to save initial load time
            "data/hvn_data.xlsx": { url: "./data/hvn_data.xlsx" + v }
          }
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
